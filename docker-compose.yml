# =====================================================
# StockUp - Docker Compose untuk Local Development
# =====================================================
# Menjalankan MySQL database untuk development
# Usage: docker-compose up -d
# =====================================================

services:
  mysql:
    image: mysql:8.0
    container_name: stockup-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: stockup_root
      MYSQL_DATABASE: stockup_dev
      MYSQL_USER: stockup_user
      MYSQL_PASSWORD: stockup_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local
